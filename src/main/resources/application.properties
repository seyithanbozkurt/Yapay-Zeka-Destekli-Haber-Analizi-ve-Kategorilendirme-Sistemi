spring.application.name=bitirme-projesi
server.port=8989

# Yerel PostgreSQL veritabani baglantisi
spring.datasource.url=jdbc:postgresql://localhost:5432/haberdb
spring.datasource.username=postgres
spring.datasource.password=bulunmaz3457

spring.datasource.driver-class-name=org.postgresql.Driver
# ===============================
# JPA / HIBERNATE AYARLARI
# ===============================

# PostgreSQL veritabani platformu
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Hibernate otomatik sekma yonetimi
# update: Mevcut tablolari gunceller, yeni tablolar olusturur
spring.jpa.hibernate.ddl-auto=update

# SQL sorgularini console'da goster
spring.jpa.show-sql=false

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.swagger-ui.supported-submit-methods=get,post,put,delete,patch
springdoc.swagger-ui.display-request-duration=true
# none: tüm etiketler kapalı (yeni endpoint kolay kaçar). list: etiketleri açık listele — seed-and-train dahil ML grubunu görmek için.
springdoc.swagger-ui.doc-expansion=list
springdoc.swagger-ui.persistAuthorization=true

# ===============================
# Makine ogrenmesi siniflandirici (Spark + Lucene TF-IDF + dogrusal SVM)
# Bu blok: Spark ile TF-IDF + dogrusal SVM egitimi/tahmini icin. false iken uygulama anahtar kelime tabanli siniflandirmayi kullanir.
# ===============================
# Spark tabanli ML: true = Spark bean ve (diskte model varsa) ML tahmini acik; model yoksa anahtar kelimeye duser
ml.classifier.enabled=true
# Spark calisma modu; local[*] = tum CPU cekirdekleriyle yerel calistirma
ml.classifier.spark-master=local[*]
# Egitilmis modelin kaydedildigi/okundugu klasor (proje kokune gore)
ml.classifier.model-path=data/ml-model
# Izole Spark egitimi icin antlr4-runtime 4.9.3 jar (tam yol). Docker: /app/deps/antlr4-runtime-4.9.3.jar
ml.classifier.antlr493-jar-path=${ML_CLASSIFIER_ANTLR493_JAR:}
# Tahmin guven esigi; 0.0 = esik yok (tum tahminler gecerli sayilir)
ml.classifier.min-confidence=0.0
# Egitime baslamak icin gereken minimum etiketli haber sayisi
ml.classifier.min-training-samples=50
# n-gram: metinden ard arda kac kelimelik dilimlerle ozellik cikarilacagi (1=tek kelime, 2=cift, 3=uclu)
ml.classifier.n-gram-min=1
ml.classifier.n-gram-max=3
# TF-IDF sozluk boyutu; yuksek = daha ince model, daha fazla RAM
ml.classifier.num-features=262144
# SVM reg-param (C ile ters orantili dusunulebilir): buyuk = daha duz sinir, veriye daha az yapisir
ml.classifier.reg-param=0.05
# SVM ic optimizasyon en fazla kac iterasyon surer
ml.classifier.max-iter=150
# Egitim sonrasi train/test ayrimiyla basari olculeri (dogruluk, kesinlik, duyarlilik, F1)
ml.classifier.run-evaluation-after-train=true
# Test icin ayrilan ornek orani; 0.2 = verinin %20'si test, %80'i egitim
ml.classifier.test-split-ratio=0.2
# Rastgele bolme ve ornekleme tohumu; ayni sonuclari tekrarlamak icin
ml.classifier.evaluation-seed=42

# YZ-AI egitim verisi tohumlama: her aktif kategoride en az bu kadar etiketli haber hedeflenir (ustune ceil(min-training-samples / K) de uygulanir)
app.ml.seed.min-per-category=4

# Zamanlayici: true ise her 5 saatte tum haber + siniflandirma sonuclari silinir, haberler bastan cekilir (cron: 0 0 */5 * * ?). Kapatmak icin false.
scheduler.delete-refresh.enabled=true
