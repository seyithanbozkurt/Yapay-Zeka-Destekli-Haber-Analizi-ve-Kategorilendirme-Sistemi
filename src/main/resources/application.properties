spring.application.name=bitirme-projesi
server.port=8989

# Yerel PostgreSQL veritabani baglantisi
spring.datasource.url=jdbc:postgresql://localhost:5432/haberdb
spring.datasource.username=postgres
spring.datasource.password=bulunmaz3457

spring.datasource.driver-class-name=org.postgresql.Driver
# ===============================
# JPA / HIBERNATE AYARLARI
# ===============================

# PostgreSQL veritabani platformu
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Hibernate otomatik sekma yonetimi
# update: Mevcut tablolari gunceller, yeni tablolar olusturur
spring.jpa.hibernate.ddl-auto=update

# SQL sorgularini console'da goster
spring.jpa.show-sql=false

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.swagger-ui.supported-submit-methods=get,post,put,delete,patch
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.doc-expansion=none
springdoc.swagger-ui.persistAuthorization=true

# ===============================
# ML / NLP SINIFLANDIRICI (Spark + Lucene TF-IDF + Linear SVM)
# ===============================
ml.classifier.enabled=false
ml.classifier.spark-master=local[*]
ml.classifier.model-path=data/ml-model
ml.classifier.min-confidence=0.0
ml.classifier.min-training-samples=50
# Özellik çıkarımı: n-gram (1=unigram, 2=+bigram, 3=+trigram)
ml.classifier.n-gram-min=1
ml.classifier.n-gram-max=3
ml.classifier.num-features=262144
# Linear SVM öğrenme parametreleri (doğruluk/overfitting dengesi)
ml.classifier.reg-param=0.05
ml.classifier.max-iter=150
# Eğitim sonrası train/test split ile değerlendirme (Accuracy, Precision, Recall, F1)
ml.classifier.run-evaluation-after-train=true
ml.classifier.test-split-ratio=0.2
ml.classifier.evaluation-seed=42

# Her 5 saatte bir haberler silinir ve yeniden çekilir (cron: 0 0 */5 * * ?). Kapatmak için false yapın.
scheduler.delete-refresh.enabled=true
