spring.application.name=bitirme-projesi
server.port=8989

# Yerel PostgreSQL veritabani baglantisi
spring.datasource.url=jdbc:postgresql://localhost:5432/haberdb
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.datasource.driver-class-name=org.postgresql.Driver
# ===============================
# JPA / HIBERNATE AYARLARI
# ===============================

# PostgreSQL veritabani platformu
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Hibernate otomatik sekma yonetimi
# update: Mevcut tablolari gunceller, yeni tablolar olusturur
spring.jpa.hibernate.ddl-auto=update

# SQL sorgularini console'da goster
spring.jpa.show-sql=false

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.swagger-ui.supported-submit-methods=get,post,put,delete,patch
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.doc-expansion=none
springdoc.swagger-ui.persistAuthorization=true
